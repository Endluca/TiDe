services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tit_growth
      POSTGRES_USER: tit_growth_app
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tit_growth_app -d tit_growth"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - tit_growth_postgres:/var/lib/postgresql/data

volumes:
  tit_growth_postgres:
